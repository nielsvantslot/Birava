name: Bug report
description: Something is broken or behaves incorrectly.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug
      description: What's broken?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps from a clean state.
      placeholder: |
        1. As User A, ...
        2. As User B, ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual
    validations:
      required: false

  - type: textarea
    id: root-cause
    attributes:
      label: Root cause (if known)
      description: File:line references if you've traced it.
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - local
        - staging
        - production
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority-high (user-facing breakage or time-sensitive)
        - priority-medium (worth doing soon, not urgent)
        - priority-low (nice to have, no rush)
    validations:
      required: false
