name: CI

on:
  pull_request:

jobs:
  build-and-migrate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: birava
          POSTGRES_USER: birava
          POSTGRES_PASSWORD: birava
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U birava -d birava"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://birava:birava@localhost:5432/birava?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run migrations against a fresh database
        run: npm run db:migrate

      - name: Build
        run: npm run build
