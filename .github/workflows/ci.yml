name: CI

on:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: birava
          POSTGRES_USER: birava
          POSTGRES_PASSWORD: birava
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U birava -d birava"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://birava:birava@localhost:5432/birava?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      PORT: "3001"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Fastest, no DB needed — fail fast before anything else.
      - name: Unit tests
        run: npm run test:unit

      - name: Run migrations against a fresh database
        run: npm run db:migrate

      # The service Postgres above is already a fresh, isolated container
      # for this run — no separate test database needed in CI.
      - name: Integration tests
        run: npx vitest run --project integration

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
