name: Tag version

# Bumps a version tag on every push to dev/staging/main, cascading like semver:
# dev push -> patch+1, staging push (promotion) -> minor+1/patch=0, main push
# (promotion) -> major+1/minor=0/patch=0. Tags are used instead of a committed
# file so promotion merges (dev->staging->main) never conflict on a version
# line, and pushing a tag doesn't match `branches:` below, so this can't
# retrigger itself.
on:
  push:
    branches: [dev, staging, main]

permissions:
  contents: write

concurrency:
  group: version-tag
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and push next tag
        run: |
          set -euo pipefail
          git fetch --tags origin

          latest=$(git tag --list 'v*' --sort=-v:refname | head -1)
          latest=${latest:-v1.0.0}
          version=${latest#v}
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          patch=$(echo "$version" | cut -d. -f3)

          case "${{ github.ref_name }}" in
            dev)
              patch=$((patch + 1))
              ;;
            staging)
              minor=$((minor + 1))
              patch=0
              ;;
            main)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
          esac

          new_tag="v${major}.${minor}.${patch}"
          echo "Tagging $new_tag on ${{ github.ref_name }} (was $latest)"
          git tag "$new_tag"
          git push origin "$new_tag"
