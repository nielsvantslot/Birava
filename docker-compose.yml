services:
  app:
    image: node:20-alpine
    container_name: birava-app
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://birava:birava@db:5432/birava?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    command: >
      sh -c "if [ ! -d node_modules ] || [ ! -f node_modules/.install-stamp ] || [ package-lock.json -nt node_modules/.install-stamp ]; then npm install && touch node_modules/.install-stamp; fi &&
      npm run prisma:generate &&
      npm run db:migrate &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - birava-node-modules:/app/node_modules
      - birava-next-cache:/app/.next

  db:
    image: postgres:16-alpine
    container_name: birava-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: birava
      POSTGRES_USER: birava
      POSTGRES_PASSWORD: birava
    ports:
      - "5433:5432"
    volumes:
      - birava-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birava -d birava"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Isolated database for integration tests — `docker compose --profile test
  # up -d db-test`. Deliberately no named volume: always empty on a fresh
  # `up`, so tests never see dev's seeded/real data.
  db-test:
    image: postgres:16-alpine
    container_name: birava-postgres-test
    profiles: ["test"]
    environment:
      POSTGRES_DB: birava_test
      POSTGRES_USER: birava
      POSTGRES_PASSWORD: birava
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birava -d birava_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  # E2E runner — `docker compose --profile test run --rm playwright npm run
  # test:e2e`. Deliberately not birava-app: that's node:20-alpine, and
  # Playwright doesn't publish official Alpine (musl) browser builds.
  # Microsoft's own image is Debian-based with browsers preinstalled, and
  # gets its own node_modules volume since Alpine/Debian native binaries
  # (e.g. sharp) aren't interchangeable with birava-app's.
  playwright:
    image: mcr.microsoft.com/playwright:v1.61.1-jammy
    container_name: birava-playwright
    profiles: ["test"]
    working_dir: /app
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://birava:birava@db-test:5432/birava_test?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3001
    command: >
      sh -c "npm install &&
      npx prisma migrate deploy &&
      npm run test:e2e"
    volumes:
      - ./:/app
      - birava-playwright-node-modules:/app/node_modules
      - birava-playwright-next-cache:/app/.next

volumes:
  birava-postgres-data:
  birava-node-modules:
  birava-next-cache:
  birava-playwright-node-modules:
  birava-playwright-next-cache:
